<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Finish Pro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1 class="title">📸 Photo Finish</h1>

  <!-- ROOM -->
  <div class="card">
    <input id="roomId" placeholder="Enter Room ID">
    <div class="row">
      <button class="btn secondary" onclick="createRoom()">Create</button>
      <button class="btn primary" onclick="joinRoom()">Join</button>
    </div>
  </div>

  <!-- CONTROL -->
  <div class="card center">
    <button class="btn start" onclick="startRace()">START RACE</button>
    <p id="status">Idle</p>
  </div>

  <!-- TIMER -->
  <div class="timer-box">
    <h2 id="timer">0.00s</h2>
  </div>

  <!-- CAMERA -->
  <div class="card">
    <video id="camera" autoplay playsinline></video>
  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
