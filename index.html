<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprintFinish AI - Download & Motion Detection</title>
    <style>
        :root { --accent: #ff3e3e; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        .header { padding: 10px; background: #1e1e1e; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        #timer { font-family: monospace; font-size: 3rem; color: #00ff00; margin: 5px 0; }
        
        .viewfinder { position: relative; width: 100%; max-width: 400px; margin: 10px auto; border: 2px solid #333; }
        video { width: 100%; display: block; background: #000; }
        #line { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: var(--accent); z-index: 10; }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sec { background: #28a745; color: white; }
        .btn-down { background: #007bff; color: white; }

        .status-bar { font-size: 0.7rem; padding: 5px; background: #222; color: #aaa; }
        
        .result-area { width: 98%; margin: 10px auto; overflow-x: auto; background: #000; border: 1px solid #444; }
        canvas#photoFinish { display: block; height: 300px; }

        .record-table { width: 95%; margin: 10px auto; background: #1e1e1e; border-radius: 8px; padding: 10px; text-align: left; }
        .record-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #333; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header">
    <div id="timer">00:00.000</div>
    <div class="status-bar" id="status">Sistem Offline</div>
</div>

<div class="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <div id="line"></div>
</div>

<div class="controls">
    <button id="btnInit" class="btn-main">1. AKTIFKAN SISTEM</button>
    <button id="btnStop" class="btn-main" style="display:none; background:#ffc107; color:black;">STOP</button>
    <button id="btnDownloadImg" class="btn-down">MUAT TURUN FOTO</button>
    <button id="btnDownloadData" class="btn-down">MUAT TURUN DATA</button>
    <button onclick="location.reload()" style="background:#555; color:white;">RESET</button>
</div>

<div class="result-area" id="scrollContainer">
    <canvas id="photoFinish"></canvas>
</div>

<div class="record-table">
    <div id="recordList"></div>
</div>

<canvas id="motionCanvas" style="display:none;"></canvas>

<script>
    const v = document.getElementById('video');
    const canvas = document.getElementById('photoFinish');
    const ctx = canvas.getContext('2d');
    const mCanvas = document.getElementById('motionCanvas');
    const mCtx = mCanvas.getContext('2d');

    let startTime, isRunning = false, isListening = false, isDetectingMotion = false;
    let scanX = 0, frameData = [], results = [];
    let lastFrameData = null;

    // --- 1. SETTINGS & INIT ---
    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", frameRate: 60 }, 
            audio: { echoCancellation: false } 
        });
        v.srcObject = stream;
        isListening = true;
        document.getElementById('btnInit').style.display = 'none';
        document.getElementById('btnStop').style.display = 'inline-block';
        document.getElementById('status').textContent = "MENUNGGU PISTOL...";
        setupAudio(stream);
        resetCanvas();
    }

    // --- 2. AUDIO TRIGGER ---
    function setupAudio(stream) {
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        const data = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);

        function check() {
            if (!isListening) return;
            analyser.getByteTimeDomainData(data);
            let max = 0;
            for(let i=0; i<data.length; i++) {
                let val = Math.abs(data[i]-128);
                if(val > max) max = val;
            }
            // Gunakan threshold 30 (boleh dilaras via localStorage jika perlu)
            if(max > 30) {
                isListening = false;
                startTime = performance.now();
                isDetectingMotion = true; // Pistol bunyi, sekarang tunggu gerakan di kamera
                document.getElementById('status').textContent = "PISTOL DIBUNYIKAN! MENUNGGU GERAKAN DI GARISAN...";
                detectMotion();
            }
            requestAnimationFrame(check);
        }
        check();
    }

    // --- 3. MOTION DETECTION (Image Detection) ---
    function detectMotion() {
        if (!isDetectingMotion) return;

        mCanvas.width = v.videoWidth / 8; // Kecilkan saiz untuk kelajuan
        mCanvas.height = v.videoHeight / 8;
        mCtx.drawImage(v, 0, 0, mCanvas.width, mCanvas.height);
        const currentFrame = mCtx.getImageData(0, 0, mCanvas.width, mCanvas.height);

        if (lastFrameData) {
            let diff = 0;
            for (let i = 0; i < currentFrame.data.length; i += 4) {
                diff += Math.abs(currentFrame.data[i] - lastFrameData.data[i]);
            }
            // Jika perbezaan pixel > threshold, bermakna ada pelari sampai
            if (diff > 5000) { 
                isDetectingMotion = false;
                isRunning = true;
                document.getElementById('status').textContent = "MERAKAM PENAMAT...";
                render();
                return;
            }
        }
        lastFrameData = currentFrame;
        
        // Kemaskini timer walaupun belum rakam slit-scan
        const diffTime = performance.now() - startTime;
        document.getElementById('timer').textContent = formatTime(diffTime);
        
        requestAnimationFrame(detectMotion);
    }

    // --- 4. RENDER SLIT-SCAN ---
    function render() {
        if(!isRunning) return;
        const diff = performance.now() - startTime;
        const timeStr = formatTime(diff);
        document.getElementById('timer').textContent = timeStr;

        ctx.drawImage(v, v.videoWidth/2, 0, 2, v.videoHeight, scanX, 0, 2, canvas.height);
        frameData[scanX] = timeStr;
        scanX += 2;
        document.getElementById('scrollContainer').scrollLeft = scanX;
        requestAnimationFrame(render);
    }

    // --- 5. MUAT TURUN FUNGSI ---
    document.getElementById('btnDownloadImg').onclick = () => {
        const link = document.createElement('a');
        link.download = `PhotoFinish_${new Date().getTime()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    };

    document.getElementById('btnDownloadData').onclick = () => {
        let content = "Keputusan Perlumbaan\n===================\n";
        results.forEach((r, i) => { content += `Pelari ${i+1}: ${r.time}\n`; });
        const blob = new Blob([content], {type: 'text/plain'});
        const link = document.createElement('a');
        link.download = `Keputusan_${new Date().getTime()}.txt`;
        link.href = URL.createObjectURL(blob);
        link.click();
    };

    // --- 6. KLIK UNTUK MASA ---
    canvas.addEventListener('click', (e) => {
        if(isRunning || isDetectingMotion) return;
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
        const time = frameData[x] || frameData[x-1] || "00:00.000";
        
        results.push({ x, time });
        ctx.strokeStyle = "cyan";
        ctx.strokeRect(x, 0, 1, canvas.height);
        ctx.fillStyle = "cyan";
        ctx.fillText(time, x + 5, 20 + (results.length * 10));
        updateTable();
    });

    function formatTime(diff) {
        const m = Math.floor(diff/60000).toString().padStart(2,'0');
        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
        const ms = Math.floor(diff%1000).toString().padStart(3,'0');
        return `${m}:${s}.${ms}`;
    }

    function resetCanvas() {
        canvas.width = 10000; canvas.height = 300;
        ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
        scanX = 0; frameData = []; results = [];
    }

    function updateTable() {
        const list = document.getElementById('recordList');
        list.innerHTML = results.map((r, i) => `<div class="record-item"><span>Pelari ${i+1}</span><b>${r.time}</b></div>`).join('');
    }

    document.getElementById('btnInit').onclick = init;
    document.getElementById('btnStop').onclick = () => {
        isRunning = false; isDetectingMotion = false;
        document.getElementById('status').textContent = "TAMAT. Sila klik imej & muat turun.";
    };
</script>
</body>
</html>
