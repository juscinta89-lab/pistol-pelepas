<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SprintFinish AI - Slit-Scan Timer</title>
    <style>
        :root { --accent: #ff3e3e; --bg: #121212; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
               background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        header { padding: 20px; text-align: center; background: #1e1e1e; border-bottom: 2px solid var(--accent); }
        
        .container { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        #timer { font-family: monospace; font-size: 4rem; color: #00ff00; margin: 10px 0; text-shadow: 0 0 10px rgba(0,255,0,0.5); }
        
        .live-preview { position: relative; width: 100%; max-width: 640px; border: 1px solid #444; margin-bottom: 10px; }
        video { width: 100%; display: block; }
        #finishLine { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: var(--accent); }

        .result-container { width: 100%; overflow-x: auto; background: #000; margin-top: 20px; border: 2px solid #333; }
        canvas { display: block; height: 300px; cursor: crosshair; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 640px; padding: 10px; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        #btnInit { grid-column: span 2; background: var(--accent); color: white; }
        #btnReset { background: #444; color: white; }
        .status { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <h1>SprintFinish PWA</h1>
    <div id="timer">00:00.000</div>
</header>

<div class="container">
    <div class="live-preview">
        <video id="video" autoplay playsinline muted></video>
        <div id="finishLine"></div>
    </div>

    <div class="controls">
        <button id="btnInit">1. AKTIFKAN KAMERA & AUX</button>
        <button id="btnReset" onclick="location.reload()">RESET</button>
        <div class="status" id="statusMsg">Sila tekan butang merah untuk mula.</div>
    </div>

    <div class="result-container">
        <canvas id="photoFinishCanvas"></canvas>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('photoFinishCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const timerDisplay = document.getElementById('timer');
    const btnInit = document.getElementById('btnInit');
    const statusMsg = document.getElementById('statusMsg');

    let startTime = 0;
    let isRunning = false;
    let scanX = 0;
    let animationId;

    // Tetapan Slit-Scan
    const SLIT_WIDTH = 2; // Lebar jalur piksel (px)
    
    async function initApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "environment",
                    frameRate: { ideal: 60 },
                    width: { ideal: 1280 }
                }, 
                audio: true 
            });
            
            video.srcObject = stream;
            statusMsg.textContent = "Menunggu isyarat AUX dari pistol...";
            btnInit.textContent = "SEDIA / LISTENING...";
            btnInit.style.background = "#orange";

            setupAudioTrigger(stream);
            setupCanvas();
        } catch (err) {
            alert("Ralat akses: " + err);
        }
    }

    function setupAudioTrigger(stream) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);

        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function detect() {
            analyser.getByteTimeDomainData(dataArray);
            
            // Mengesan lonjakan voltan dari AUX (Pistol)
            for (let i = 0; i < dataArray.length; i++) {
                if (dataArray[i] > 180 || dataArray[i] < 70) { 
                    if (!isRunning) {
                        startRace();
                        return;
                    }
                }
            }
            if (!isRunning) requestAnimationFrame(detect);
        }
        detect();
    }

    function setupCanvas() {
        canvas.height = 300; // Resolusi output
        canvas.width = window.innerWidth * 5; // Panjang canvas (boleh scroll)
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function startRace() {
        isRunning = true;
        startTime = performance.now();
        statusMsg.textContent = "PERLUMBAAN BERMULA!";
        statusMsg.style.color = "#00ff00";
        renderSlitScan();
    }

    function renderSlitScan() {
        if (!isRunning) return;

        const now = performance.now();
        const elapsed = now - startTime;

        // 1. Update Timer Display
        const m = Math.floor(elapsed / 60000).toString().padStart(2, '0');
        const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
        const ms = Math.floor(elapsed % 1000).toString().padStart(3, '0');
        timerDisplay.textContent = `${m}:${s}.${ms}`;

        // 2. Slit-Scan Logic
        // Ambil jalur tengah dari video feed
        const sourceX = video.videoWidth / 2;
        ctx.drawImage(
            video, 
            sourceX, 0, SLIT_WIDTH, video.videoHeight, // Source (tengah video)
            scanX, 0, SLIT_WIDTH, canvas.height        // Destination (di canvas)
        );

        // Gerakkan pointer ke kanan
        scanX += SLIT_WIDTH;

        // Auto-scroll canvas container ke kanan
        const container = document.querySelector('.result-container');
        container.scrollLeft = scanX - container.clientWidth / 2;

        animationId = requestAnimationFrame(renderSlitScan);
    }

    btnInit.addEventListener('click', () => {
        initApp();
    });

</script>
</body>
</html>
