<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprintFinish Pro - Audio Loopback</title>
    <style>
        :root { --accent: #ff3e3e; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        .header { padding: 10px; background: #1e1e1e; border-bottom: 2px solid var(--accent); }
        #timer { font-family: monospace; font-size: 3rem; color: #00ff00; }
        
        .audio-box { background: #222; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #444; }
        .toggle-container { margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 24px; }
        input:checked + .slider { background-color: #28a745; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(26px); }

        .viewfinder { position: relative; width: 100%; max-width: 400px; margin: 10px auto; border: 1px solid #333; }
        video { width: 100%; display: block; }
        #line { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: var(--accent); }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; }
        button { padding: 12px 18px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        
        .result-area { width: 98%; margin: 10px auto; overflow-x: auto; background: #000; border: 1px solid #444; }
        canvas#photoFinish { display: block; height: 300px; }
    </style>
</head>
<body>

<div class="header">
    <div id="timer">00:00.000</div>
</div>

<div class="audio-box">
    <div class="toggle-container">
        <span>🔈 Monitor Audio (Speaker)</span>
        <label class="switch">
            <input type="checkbox" id="audioLoopback">
            <span class="slider"></span>
        </label>
    </div>
    <div style="font-size: 0.7rem; color: #888;">
        Amaran: Gunakan earphone/speaker luaran untuk mengelakkan 'feedback' (bunyi berdengung).
    </div>
</div>

<div class="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <div id="line"></div>
</div>

<div class="controls">
    <button id="btnInit" class="btn-main">AKTIFKAN SISTEM</button>
    <button id="btnStop" style="display:none; background:#ffc107;">STOP</button>
    <button id="btnDownload" style="background:#007bff; color:white;">SIMPAN FOTO</button>
    <button onclick="location.reload()" style="background:#555; color:white;">RESET</button>
</div>

<div class="result-area" id="scrollContainer">
    <canvas id="photoFinish"></canvas>
</div>

<script>
    const v = document.getElementById('video');
    const canvas = document.getElementById('photoFinish');
    const ctx = canvas.getContext('2d');
    const loopbackToggle = document.getElementById('audioLoopback');

    let audioCtx, source, analyser, loopbackNode;
    let startTime, isRunning = false, isListening = false, scanX = 0, frameData = [];

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", frameRate: 60 }, 
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
        });
        
        v.srcObject = stream;
        isListening = true;
        document.getElementById('btnInit').style.display = 'none';
        document.getElementById('btnStop').style.display = 'inline-block';
        
        setupAudio(stream);
        resetCanvas();
    }

    function setupAudio(stream) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        source.connect(analyser);

        // Fungsi Loopback (Output ke Speaker)
        loopbackToggle.onchange = () => {
            if (loopbackToggle.checked) {
                // Sambungkan input terus ke destination (speaker)
                source.connect(audioCtx.destination);
            } else {
                // Putuskan sambungan ke speaker
                source.disconnect(audioCtx.destination);
                source.connect(analyser); // Kekalkan sambungan ke analyser untuk trigger
            }
        };

        const data = new Uint8Array(analyser.frequencyBinCount);
        function check() {
            if (!isListening) return;
            analyser.getByteTimeDomainData(data);
            let max = 0;
            for(let i=0; i<data.length; i++) {
                let val = Math.abs(data[i]-128);
                if(val > max) max = val;
            }
            // Trigger pada threshold 30
            if(max > 30) {
                isListening = false;
                startTime = performance.now();
                isRunning = true;
                render();
            }
            requestAnimationFrame(check);
        }
        check();
    }

    function render() {
        if(!isRunning) return;
        const diff = performance.now() - startTime;
        document.getElementById('timer').textContent = formatTime(diff);
        ctx.drawImage(v, v.videoWidth/2, 0, 2, v.videoHeight, scanX, 0, 2, canvas.height);
        frameData[scanX] = formatTime(diff);
        scanX += 2;
        document.getElementById('scrollContainer').scrollLeft = scanX;
        requestAnimationFrame(render);
    }

    function formatTime(diff) {
        const m = Math.floor(diff/60000).toString().padStart(2,'0');
        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
        const ms = Math.floor(diff%1000).toString().padStart(3,'0');
        return `${m}:${s}.${ms}`;
    }

    function resetCanvas() {
        canvas.width = 10000; canvas.height = 300;
        ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
        scanX = 0;
    }

    document.getElementById('btnInit').onclick = init;
    document.getElementById('btnStop').onclick = () => isRunning = false;
    document.getElementById('btnDownload').onclick = () => {
        const link = document.createElement('a');
        link.download = 'PhotoFinish.png';
        link.href = canvas.toDataURL();
        link.click();
    };
</script>
</body>
</html>
